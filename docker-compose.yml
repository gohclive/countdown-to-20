services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marriage-proposal-site
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    command: tunnel run
    env_file:
      - .env.local
    depends_on:
      - app
